name: api-app
services:
  - name: api
    github:
      branch: main
      deploy_on_push: true
      repo: neurokrystal/front-end
    source_dir: /
    build_command: pnpm --filter @dimensional/shared build && pnpm --filter api build
    run_command: pnpm --filter api start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    routes:
      - path: /
    envs:
      - key: CI
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: NEXT_TELEMETRY_DISABLED
        scope: RUN_AND_BUILD_TIME
        value: "1"
      - key: NPM_CONFIG_UPDATE_NOTIFIER
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: NPM_CONFIG_PROGRESS
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: NPM_CONFIG_COLOR
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: NPM_CONFIG_FUND
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: APP_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: SKIP_NODE_PRUNE
        scope: BUILD_TIME
        value: "true"
      - key: POSTGRES_DB_URL
        scope: RUN_TIME
        type: SECRET
      - key: BETTER_AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: BETTER_AUTH_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: https://your-web-app.com # Update to your frontend URL
      - key: MAILGUN_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MAILGUN_DOMAIN
        scope: RUN_TIME
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_ENDPOINT
        scope: RUN_TIME
      - key: DO_SPACES_BUCKET
        scope: RUN_TIME
      - key: DO_SPACES_REGION
        scope: RUN_TIME
      - key: CHILD_CONCURRENCY
        scope: BUILD_TIME
        value: "1"
      - key: NODE_OPTIONS
        scope: RUN_TIME
        value: --max-old-space-size=400
      - key: NODE_OPTIONS
        scope: BUILD_TIME
        value: --max-old-space-size=448
functions: []
