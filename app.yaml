name: dimensional-system
region: syd1

# =============================================
# API Service (Fastify + Puppeteer)
# =============================================
services:
  - name: api
    dockerfile_path: apps/api/Dockerfile
    github:
      repo: YOUR_GITHUB_ORG/dimensional-system
      branch: main
      deploy_on_push: true
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: professional-s
    # professional-s = 1 vCPU, 2GB RAM — minimum for Puppeteer
    # Upgrade to professional-m (2 vCPU, 4GB) if PDF generation is slow
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: PROXY_STRIPS_PREFIX
        scope: RUN_TIME
        value: "true"
      - key: POSTGRES_DB_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: BETTER_AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: BETTER_AUTH_URL
        scope: RUN_TIME
        value: ${api.PUBLIC_URL}
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_BUCKET
        scope: RUN_TIME
      - key: DO_SPACES_ENDPOINT
        scope: RUN_TIME
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: COMMIT_SHA
        scope: RUN_TIME
        value: ${_self.COMMIT_HASH}
    routes:
      - path: /api
      - path: /auth

  # =============================================
  # Web Service (Next.js)
  # =============================================
  - name: web
    dockerfile_path: apps/web/Dockerfile
    github:
      repo: YOUR_GITHUB_ORG/dimensional-system
      branch: main
      deploy_on_push: true
    source_dir: /
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 30
    build_command: echo "Build handled by Dockerfile"
    envs:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ${api.PUBLIC_URL}
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_TIME
        value: ${api.PUBLIC_URL}
    routes:
      - path: /

# =============================================
# Database
# =============================================
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb
    num_nodes: 1
